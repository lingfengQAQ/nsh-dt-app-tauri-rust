<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>截图区域</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        overflow: hidden;
      }

      body {
        position: relative;
        border: 3px solid #42a5ff;
        background: rgb(48 132 255 / 18%);
        box-shadow:
          inset 0 0 0 2px rgb(255 255 255 / 75%),
          inset 0 0 38px rgb(0 0 0 / 18%);
        cursor: move;
        user-select: none;
        -webkit-user-select: none;
        font-family: "Microsoft YaHei", "Segoe UI", sans-serif;
      }

      body::before {
        position: absolute;
        inset: 12px;
        border: 1px dashed rgb(255 255 255 / 78%);
        border-radius: 8px;
        content: "";
        pointer-events: none;
      }

      .resize-handle {
        position: absolute;
        z-index: 10;
        width: 14px;
        height: 14px;
        background: #42a5ff;
        border: 2px solid #ffffff;
        border-radius: 50%;
        box-shadow: 0 0 0 2px rgb(0 0 0 / 45%);
      }

      .resize-zone {
        position: absolute;
        z-index: 9;
        background: transparent;
      }

      .zone-n,
      .zone-s {
        left: 16px;
        width: calc(100% - 32px);
        height: 14px;
      }

      .zone-e,
      .zone-w {
        top: 16px;
        width: 14px;
        height: calc(100% - 32px);
      }

      .zone-tl,
      .zone-tr,
      .zone-bl,
      .zone-br {
        width: 24px;
        height: 24px;
        z-index: 11;
      }

      .handle-tl {
        top: -7px;
        left: -7px;
        cursor: nw-resize;
      }

      .zone-tl {
        top: 0;
        left: 0;
        cursor: nw-resize;
      }

      .handle-tr {
        top: -7px;
        right: -7px;
        cursor: ne-resize;
      }

      .zone-tr {
        top: 0;
        right: 0;
        cursor: ne-resize;
      }

      .handle-bl {
        bottom: -7px;
        left: -7px;
        cursor: sw-resize;
      }

      .zone-bl {
        bottom: 0;
        left: 0;
        cursor: sw-resize;
      }

      .handle-br {
        right: -7px;
        bottom: -7px;
        cursor: se-resize;
      }

      .zone-br {
        right: 0;
        bottom: 0;
        cursor: se-resize;
      }

      .handle-n {
        top: -7px;
        left: 50%;
        transform: translateX(-50%);
        cursor: n-resize;
      }

      .zone-n {
        top: 0;
        cursor: n-resize;
      }

      .handle-e {
        top: 50%;
        right: -7px;
        transform: translateY(-50%);
        cursor: e-resize;
      }

      .zone-e {
        right: 0;
        cursor: e-resize;
      }

      .handle-s {
        bottom: -7px;
        left: 50%;
        transform: translateX(-50%);
        cursor: s-resize;
      }

      .zone-s {
        bottom: 0;
        cursor: s-resize;
      }

      .handle-w {
        top: 50%;
        left: -7px;
        transform: translateY(-50%);
        cursor: w-resize;
      }

      .zone-w {
        left: 0;
        cursor: w-resize;
      }

      .info,
      .hint,
      .status {
        position: absolute;
        color: #ffffff;
        text-shadow: 2px 2px 4px rgb(0 0 0 / 80%);
        pointer-events: none;
      }

      .info {
        top: 12px;
        left: 14px;
        font-size: 14px;
        font-weight: 700;
      }

      .status {
        top: 36px;
        left: 14px;
        max-width: calc(100% - 20px);
        overflow: hidden;
        font-size: 12px;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .hint {
        bottom: 12px;
        left: 50%;
        transform: translateX(-50%);
        width: max-content;
        max-width: calc(100% - 20px);
        border: 2px solid rgb(255 255 255 / 82%);
        border-radius: 999px;
        padding: 4px 10px;
        background: rgb(0 0 0 / 48%);
        font-size: 12px;
        font-weight: 700;
        text-align: center;
      }
    </style>
  </head>
  <body>
    <div class="resize-zone zone-tl" data-direction="NorthWest"></div>
    <div class="resize-zone zone-n" data-direction="North"></div>
    <div class="resize-zone zone-tr" data-direction="NorthEast"></div>
    <div class="resize-zone zone-e" data-direction="East"></div>
    <div class="resize-zone zone-bl" data-direction="SouthWest"></div>
    <div class="resize-zone zone-s" data-direction="South"></div>
    <div class="resize-zone zone-br" data-direction="SouthEast"></div>
    <div class="resize-zone zone-w" data-direction="West"></div>
    <div class="resize-handle handle-tl" data-direction="NorthWest"></div>
    <div class="resize-handle handle-n" data-direction="North"></div>
    <div class="resize-handle handle-tr" data-direction="NorthEast"></div>
    <div class="resize-handle handle-e" data-direction="East"></div>
    <div class="resize-handle handle-bl" data-direction="SouthWest"></div>
    <div class="resize-handle handle-s" data-direction="South"></div>
    <div class="resize-handle handle-br" data-direction="SouthEast"></div>
    <div class="resize-handle handle-w" data-direction="West"></div>
    <div class="info" id="info">400 × 300</div>
    <div class="status" id="status"></div>
    <div class="hint">拖动中间移动 ｜ 边缘调整大小 ｜ Enter 截图 ｜ Esc 取消</div>

    <script type="module">
      import { invoke } from '@tauri-apps/api/core'
      import { emitTo } from '@tauri-apps/api/event'
      import { getCurrentWindow } from '@tauri-apps/api/window'

      const selectorWindow = getCurrentWindow()
      const info = document.getElementById('info')
      const status = document.getElementById('status')

      function setStatus(message) {
        status.textContent = message || ''
      }

      function updateInfo() {
        info.textContent = `${window.innerWidth} × ${window.innerHeight}`
      }

      document.body.addEventListener('mousedown', (event) => {
        if (event.button !== 0 || event.target.closest('.resize-handle, .resize-zone')) return
        selectorWindow.startDragging().catch((error) => setStatus(`移动失败：${error}`))
      })

      for (const handle of document.querySelectorAll('.resize-handle, .resize-zone')) {
        handle.addEventListener('mousedown', (event) => {
          if (event.button !== 0) return
          event.preventDefault()
          event.stopPropagation()
          const direction = handle.dataset.direction
          selectorWindow.startResizeDragging(direction).catch((error) => setStatus(`调整失败：${error}`))
        })
      }

      document.addEventListener('keydown', async (event) => {
        if (event.key === 'Escape') {
          await invoke('close_screenshot_selector')
          await emitTo('main', 'screenshot-selector-closed', {})
          return
        }

        if (event.key === 'Enter') {
          setStatus('正在截图...')
          try {
            const result = await invoke('capture_screenshot_from_selector', { closeBeforeCapture: false })
            await invoke('close_screenshot_selector')
            await emitTo('main', 'screenshot-captured', result)
          } catch (error) {
            setStatus(`截图失败：${error}`)
          }
        }
      })

      window.addEventListener('resize', updateInfo)
      updateInfo()
    </script>
  </body>
</html>
