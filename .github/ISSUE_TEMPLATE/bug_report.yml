name: Bug Report
description: 报告一个 bug
title: "[Bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        感谢花时间提交 issue！请尽量提供完整信息，方便复现与修复。
        ⚠️ 注意：贴日志、截图前请隐去 API Key、Secret Key 等敏感字段。
  - type: input
    id: version
    attributes:
      label: 应用版本
      placeholder: "例如 0.2.0"
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: 操作系统
      placeholder: "例如 Windows 11 23H2"
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: 复现步骤
      placeholder: |
        1. 打开应用
        2. 点击截图
        3. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: 预期行为
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: 实际行为
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: 日志或截图
      description: 可选。请隐去敏感信息后粘贴。
      render: shell
